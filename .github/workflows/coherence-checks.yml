name: coherence-checks

# Five of the six release-coherence checks that live in this repo (see
# SuperFAISSUnreal/ci/) are pure file/text comparisons and need nothing but
# Python — they run here, on a standard hosted runner, on every push and pull
# request. The sixth (orphan-sweep) needs the private source-of-truth tree
# this plugin is published from, which no hosted runner can see; it runs in
# plugin-build.yml on the maintainer's self-hosted runner instead.
#
# A seventh coherence check — the repealed-phrase sweep — does NOT live in
# this repo. It inspects private source (persona names, internal paths,
# personal attribution) that must never ship, so it runs pre-publish from the
# private Wizard monorepo at Tools/PublishGates/check_repealed_phrases.py,
# against this repo's checkout, before a sync or tag — never as a workflow
# committed into the public repo it is checking.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  vendored-coherence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Vendored coherence (fetches the pinned core commit)
        run: |
          python SuperFAISSUnreal/ci/check_vendored_coherence.py \
            --plugin-root SuperFAISSUnreal

  version-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # need tag history, not just the checked-out commit
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Version identity
        # --allow-untagged: most commits land between releases, before a tag
        # exists. release.yml runs this SAME check without the flag, right
        # after cutting the tag, so the tagged case is still enforced.
        run: |
          python SuperFAISSUnreal/ci/check_version_identity.py \
            --plugin-root SuperFAISSUnreal --allow-untagged

  doc-signatures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Doc signatures
        run: |
          python SuperFAISSUnreal/ci/check_doc_signatures.py \
            --vendored-root SuperFAISSUnreal/Source/ThirdParty/SuperFAISS

  asset-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Asset references (this repo's own docs — not vendored third-party docs)
        run: |
          python SuperFAISSUnreal/ci/check_asset_references.py --repo-root . \
            README.md \
            SuperFAISSUnreal/README.md \
            SuperFAISSUnrealMCP/README.md

  reverse-doc-signatures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Reverse doc signatures (every declared public symbol is documented)
        run: |
          python SuperFAISSUnreal/ci/check_reverse_doc_signatures.py \
            --vendored-root SuperFAISSUnreal/Source/ThirdParty/SuperFAISS
